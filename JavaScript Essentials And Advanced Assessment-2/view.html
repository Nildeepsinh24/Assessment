<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Management System - View</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');

        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --neon-primary: #00f2fe;
            --neon-secondary: #4facfe;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #f43f5e;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg-dark);
            background-image:
                radial-gradient(at 0% 0%, rgba(79, 172, 254, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(244, 63, 94, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 242, 254, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
        }

        .navbar {
            background: rgba(15, 23, 42, 0.8) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
        }

        .navbar-brand {
            color: var(--text-main) !important;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .navbar-brand svg {
            color: var(--neon-primary);
            filter: drop-shadow(0 0 8px rgba(0, 242, 254, 0.6));
        }

        .nav-link {
            color: var(--text-muted) !important;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: 0;
            left: 0;
            background: linear-gradient(90deg, var(--neon-secondary), var(--neon-primary));
            transition: width 0.3s ease;
            box-shadow: 0 0 10px var(--neon-primary);
        }

        .nav-link:hover::after,
        .nav-link.active::after {
            width: 100%;
        }

        .nav-link:hover,
        .nav-link.active {
            color: var(--text-main) !important;
        }

        .table-container {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .form-control {
            border-radius: 12px;
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            padding: 14px 18px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-control::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
        }

        .form-control:focus {
            background-color: rgba(15, 23, 42, 0.9);
            border-color: var(--neon-secondary);
            color: var(--text-main);
            box-shadow: 0 0 0 4px rgba(79, 172, 254, 0.15), inset 0 0 15px rgba(79, 172, 254, 0.05);
            transform: translateY(-2px);
        }

        .table {
            border-collapse: separate;
            border-spacing: 0 12px;
            margin-top: -12px;
            color: var(--text-main);
        }

        .table thead th {
            border: none;
            background-color: transparent !important;
            color: var(--neon-secondary);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            padding: 15px;
        }

        .table tbody tr {
            background-color: rgba(255, 255, 255, 0.03);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            border-radius: 12px;
            backdrop-filter: blur(5px);
        }

        .table tbody td {
            border: none;
            padding: 18px 15px;
            vertical-align: middle;
            color: var(--text-muted);
            font-weight: 500;
        }

        .table tbody td:first-child {
            border-radius: 12px 0 0 12px;
            color: var(--text-main);
            font-weight: 600;
        }

        .table tbody td:last-child {
            border-radius: 0 12px 12px 0;
        }

        .btn-danger {
            background: rgba(244, 63, 94, 0.1);
            color: var(--accent);
            border: 1px solid rgba(244, 63, 94, 0.2);
            border-radius: 8px;
            padding: 8px 16px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px rgba(244, 63, 94, 0.1);
        }

        .btn-danger:hover {
            background: var(--accent);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(244, 63, 94, 0.4);
            border-color: var(--accent);
        }

        .no-data-msg {
            display: none;
            text-align: center;
            color: var(--text-muted);
            padding: 40px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .show-msg {
            display: block;
            animation: fadeIn 0.5s;
        }

        h2 {
            background: linear-gradient(to right, var(--text-main), var(--neon-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 30px rgba(79, 172, 254, 0.2);
            letter-spacing: 1px;
        }

        .no-data-msg {
            display: none;
            text-align: center;
            color: #6c757d;
            padding: 20px;
            font-weight: 500;
        }

        .show-msg {
            display: block;
            animation: fadeIn 0.5s;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg mb-5 sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" href="#">
                <svg xmlns="http://www.w3.org/-2000/svg" width="24" height="24" fill="currentColor"
                    class="bi bi-buildings-fill text-primary" viewBox="0 0 16 16">
                    <path
                        d="M15 .5a.5.5 0 0 0-.724-.447l-8 4A.5.5 0 0 0 6 4.5v3.14L.342 9.526A.5.5 0 0 0 0 10v5.5a.5.5 0 0 0 .5.5h9a.5.5 0 0 0 .5-.5V14h1v1.5a.5.5 0 0 0 .5.5h3a.5.5 0 0 0 .5-.5V.5ZM2 11h1v1H2v-1Zm2 0h1v1H4v-1Zm-2 2h1v1H2v-1Zm2 0h1v1H4v-1Zm4-4h1v1H8V9Zm2 0h1v1h-1V9Zm-2 2h1v1H8v-1Zm2 0h1v1h-1v-1Zm2-2h1v1h-1V9Zm0 2h1v1h-1v-1ZM8 7h1v1H8V7Zm2 0h1v1h-1V7Zm2 0h1v1h-1V7ZM8 5h1v1H8V5Zm2 0h1v1h-1V5Zm2 0h1v1h-1V5Zm0-2h1v1h-1V3Z" />
                </svg>
                Swan Solution Hotel
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Registration</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="view.html">View Submissions</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <h2 class="mb-4 fw-bold text-uppercase">GUEST SUBMISSIONS</h2>
        <div id="messageBox"></div>

        <div class="table-container">
            <div class="row mb-3">
                <div class="col-md-6">
                    <input type="text" id="searchInput" class="form-control"
                        placeholder="Search by Name or Check-in Date (YYYY-MM-DD)...">
                </div>
            </div>

            <div class="table-responsive">
                <table class="table mt-3">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Phone</th>
                            <th>Email</th>
                            <th>Aadhar Card</th>
                            <th>Check-in</th>
                            <th>Check-out</th>
                            <th>Adults</th>
                            <th>Purpose</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="submissionsTableBody">
                        <!-- Rows dynamically generated here -->
                    </tbody>
                </table>
            </div>
            <div id="noDataMessage" class="no-data-msg">
                <h4>No data found</h4>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.css"></script>
    <script src="./assets/js/utils.js"></script>
    <script src="./assets/js/SubmissionViewer.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            new SubmissionViewer('submissionsTableBody', 'searchInput');
        });
    </script>
</body>

</html>
